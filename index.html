.check-item{padding:10px 12px;border-radius:14px;border:1px solid var(--line);background:#fbfdff}
.right{margin-left:auto}.mb8{margin-bottom:8px}.mb12{margin-bottom:12px}.mb16{margin-bottom:16px}.mb20{margin-bottom:20px}.mt16{margin-top:16px}

.spinner{width:40px;height:40px;border:4px solid #dbe5f1;border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite}

// ── UIDs الأدمن الحقيقيين من Firebase Authentication ──
const ADMIN_UIDS = new Set([
  'evTQJpWDdxYkhAdiZausCnbnZb62', // sara@teamup.com
  'dy5JRtY4A3dYmG1tol3OkPQDSDT2', // asmaa@teamup.com
  'YMN7sIbVbJZXKIwOH903Yd2ndTU2'  // mustafa@teamup.com

(function(){

const uid=()=> 'id_'+Math.random().toString(36).slice(2,10);
const nowISO=()=> new Date().toISOString();

// ── المستخدم الحالي من Firebase Auth ──
let firebaseUser = null; // يُحدَّث من onAuthStateChanged

const seedUsers=[
  {id:'1vtfAy3ck2hUwhEVJmAwrbgqFY43',role:'user',name:'Test User',email:'test@teamup.com',binanceId:''}

const seedAccounts=[

  {id:'acc2',number:'116',anydeskId:'9876543210',anydeskPass:'Dragon99!!',project:'aether',accountRate:17.5,maxHours:12,assignedName:'asmaa',accountStatus:'active',adminNotes:'',visibleToUserIds:[]},
  {id:'acc3',number:'117',anydeskId:'1122334455',anydeskPass:'Eagle2024!',project:'',accountRate:12,maxHours:10,assignedName:'',accountStatus:'paused',adminNotes:'',visibleToUserIds:[]}
];
const seedTasks=[
  {id:'t1',userId:'u1',userName:'Sara',workDate:'2026-03-25',platform:'outlier',duration:'1h 4m 7s',payType:'task',projectName:'aether',account:'Account 115',notes:'Text-to-Image Head-to-Head Evaluation',status:'reviewed',reviewNote:'',submittedAt:'2026-03-25T09:00:00Z'},
  {id:'t2',userId:'u1',userName:'Sara',workDate:'2026-03-26',platform:'outlier',duration:'54m 25s',payType:'task',projectName:'aether',account:'Account 115',notes:'Text-to-Image Head-to-Head Evaluation',status:'reviewed',reviewNote:'',submittedAt:'2026-03-26T10:00:00Z'},
  {id:'t3',userId:'u2',userName:'asmaa',workDate:'2026-03-30',platform:'outlier',duration:'2',payType:'task',projectName:'aether',account:'Account 115',notes:'ايثر',status:'revision',reviewNote:'ارجعي عدليه',submittedAt:'2026-03-30T02:17:00Z'}
];

let state={
  users: seedUsers,
  accounts: seedAccounts,
  tasks: seedTasks,
  sessions: [],
  settings: {globalRate:6,rememberLogin:false,rememberedEmail:'',rememberedPassword:''},
  paymentRecords: [],
  session: loadSession(),
  routeTab: 'accounts',
  adminTab: 'tasks',
  modal: null
};

// ── حفظ البيانات في Firebase (مع تنظيف undefined) ──
function sanitize(obj){
  return JSON.parse(JSON.stringify(obj, (k,v)=> v===undefined ? null : v));
}
function persist(){
  STATE_REF.set(sanitize({
    users: state.users,
    accounts: state.accounts,
    tasks: state.tasks,
    sessions: state.sessions,
    settings: state.settings,
    paymentRecords: state.paymentRecords
  })).catch(e => console.error("Firebase save error:", e));
}

function normalizeVisibilityRules(){
  state.accounts.forEach(a=>{
    a.visibleToUserIds=Array.isArray(a.visibleToUserIds)?a.visibleToUserIds:[];
    a.visibleToUserNames=Array.isArray(a.visibleToUserNames)?a.visibleToUserNames:[];
    a.visibleToUserEmails=Array.isArray(a.visibleToUserEmails)?a.visibleToUserEmails:[];
    if(a.visibleToUserIds.length && !a.visibleToUserNames.length){
      a.visibleToUserNames=a.visibleToUserIds.map(id=>{ const u=state.users.find(x=>x.id===id); return u?u.name:id; });
    }
    if(a.visibleToUserIds.length && !a.visibleToUserEmails.length){
      a.visibleToUserEmails=a.visibleToUserIds.map(id=>{ const u=state.users.find(x=>x.id===id); return u?u.email:''; }).filter(Boolean);
    }
    if(!a.visibleToUserIds.length && a.visibleToUsers && Array.isArray(a.visibleToUsers)){
      a.visibleToUserNames=a.visibleToUsers.slice();
    }
  });
}

function fmtDate(s){if(!s)return '—'; const [y,m,d]=s.split('-'); return d+'/'+m+'/'+y;}
function fmtUTC(s){if(!s)return '—'; const d=new Date(s); const dd=String(d.getUTCDate()).padStart(2,'0'); const mm=String(d.getUTCMonth()+1).padStart(2,'0'); const yyyy=d.getUTCFullYear(); const hh=String(d.getUTCHours()).padStart(2,'0'); const mi=String(d.getUTCMinutes()).padStart(2,'0'); return `${dd}/${mm}/${yyyy} ${hh}:${mi} UTC`;}
function getWeekBounds(dateStr){const d=new Date(dateStr+'T00:00:00Z'); const dow=d.getUTCDay(); const diff=((dow-2)+7)%7; const s=new Date(d); s.setUTCDate(d.getUTCDate()-diff); const e=new Date(s); e.setUTCDate(s.getUTCDate()+6); return {start:s.toISOString().slice(0,10), end:e.toISOString().slice(0,10)};}
function parseDuration(str){if(!str)return 0; str=(''+str).trim().toLowerCase(); let t=0; const h=str.match(/(\d+\.?\d*)\s*h/), m=str.match(/(\d+\.?\d*)\s*m/), s=str.match(/(\d+\.?\d*)\s*s/); if(h)t+=parseFloat(h[1])*3600; if(m)t+=parseFloat(m[1])*60; if(s)t+=parseFloat(s[1]); if(!h&&!m&&!s&&!isNaN(parseFloat(str)))t=parseFloat(str)*3600; return t;}
function durationToParts(str){
  const sec = parseDuration(str);
  return {
    h: Math.floor(sec / 3600),
    m: Math.floor((sec % 3600) / 60),
    s: Math.floor(sec % 60)
  };
}
function partsToDuration(h, m, s){
  return `${parseInt(h||0)}h ${parseInt(m||0)}m ${parseInt(s||0)}s`;
}
function secToH(sec){return (sec/3600).toFixed(2)}
function fmtDuration(sec){ sec=Math.max(0, Math.floor(sec||0)); const h=Math.floor(sec/3600), m=Math.floor((sec%3600)/60), s=sec%60; return `${String(h).padStart(2,'0')}h ${String(m).padStart(2,'0')}m ${String(s).padStart(2,'0')}s`; }
function fmtDurationFromInput(v){ return fmtDuration(parseDuration(v)); }
function taskEarn(task,rate){return (parseDuration(task.duration)/3600*rate)}
function within(d,from,to){return (!from||d>=from)&&(!to||d<=to)}
function currentUser(){
  if(!firebaseUser) return null;
  const uid = firebaseUser.uid;
  const email = firebaseUser.email||'';
  const displayName = firebaseUser.displayName || email.split('@')[0];
  if(ADMIN_UIDS.has(uid)){
    return {id:uid, role:'admin', name:displayName, email:email};
  }
  const dbUser = state.users.find(u=>u.id===uid || u.email===email);
  if(dbUser) return dbUser;
  return {id:uid, role:'user', name:displayName, email:email};
}
function accountByLabel(lbl){return state.accounts.find(a=>`Account ${a.number}`===lbl)}
function visibleAccountsFor(user){
  const uid=String(user.id||'').toLowerCase();
  const uname=String(user.name||'').trim().toLowerCase();
  const uemail=String(user.email||'').trim().toLowerCase();
  return state.accounts.filter(a=>{
    const ids=(a.visibleToUserIds||[]).map(v=>String(v).toLowerCase());
    const names=(a.visibleToUserNames||[]).map(v=>String(v).trim().toLowerCase());
    const emails=(a.visibleToUserEmails||[]).map(v=>String(v).trim().toLowerCase());
    const hasRules=ids.length>0||names.length>0||emails.length>0;
    if(!hasRules) return false;
    return ids.includes(uid)||names.includes(uname)||names.includes(uemail)||emails.includes(uemail);
  });
}
function activeSessionFor(accId){return state.sessions.find(s=>s.accountId===accId && s.active);}
function paidKey(from,to,userId){return `${from||'all'}_${to||'all'}_${userId||'all'}`}
function purgeExpiredPayments(){
  const now=Date.now();
  const keep=[];
  state.paymentRecords.forEach(r=>{
    const ageDays=(now-new Date(r.paidAt).getTime())/86400000;
    if(ageDays>30){
      state.tasks=state.tasks.filter(t=>!(t.userId===r.userId && within(t.workDate,r.from,r.to)));
    } else keep.push(r);
  });
  state.paymentRecords=keep;
}
function paymentRecordFor(userId, from, to){ return state.paymentRecords.find(r=>r.userId===userId && r.from===from && r.to===to) || null; }
function isTaskPaid(task){ return !!state.paymentRecords.find(r=>r.userId===task.userId && within(task.workDate,r.from,r.to)); }
function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[m]));}
function shell(content,user){
  return `<div class="header"><div class="brand">Team</div><div class="row">${user?`<span class="badge b-blue">${esc(user.name)}</span>`:''}<button class="btn btn-soft" data-action="logout">Sign Out</button></div></div>${content}`;
}
function loginView(err=''){
  $('#app').innerHTML=`<div class="login-wrap"><div class="card login-card"><div class="brand mb20" style="text-align:center">Team</div>${err?`<div class="notice">${esc(err)}</div>`:''}<div class="field mb12"><label class="label">Email</label><input id="loginEmail" class="input" placeholder="email" type="email"></div><div class="field mb12"><label class="label">Password</label><input id="loginPass" type="password" class="input" placeholder="password"></div><button class="btn btn-primary" id="doLogin" style="width:100%;margin-top:8px">Sign In</button></div></div>`;
  $('#doLogin').onclick=async()=>{
    const email=$('#loginEmail').value.trim(), password=$('#loginPass').value.trim();
    if(!email||!password) return loginView('Please enter email and password');
    $('#doLogin').textContent='...'; $('#doLogin').disabled=true;
    try {
      await auth.signInWithEmailAndPassword(email, password);
    } catch(e) {
      loginView('Invalid email or password');
    }
  };
  $('#loginPass').addEventListener('keydown', e=>{ if(e.key==='Enter') $('#doLogin').click(); });
}
function statCard(v,l,cls=''){return `<div class="stat ${cls}"><div class="v">${v}</div><div class="l">${l}</div></div>`;}
function render(){
  purgeExpiredPayments();
  persist();
  const user=currentUser();
  if(!user) return loginView();
  if(user.role==='admin') return renderAdmin(user);
  return renderUser(user);
}
function renderUser(user){
  const accounts=visibleAccountsFor(user);
  const myTasks=state.tasks.filter(t=>t.userId===user.id && !isTaskPaid(t));
  const needAttention=myTasks.filter(t=>t.status==='revision'||t.status==='rejected').length;
  let content='';
  if(needAttention) content+=`<div class="notice">⚠️ You have ${needAttention} task log(s) that need your attention.</div>`;
  content+=`<div class="nav"><button class="tab ${state.routeTab==='accounts'?'active':''}" data-tab="accounts">Accounts</button><button class="tab ${state.routeTab==='tasks'?'active':''}" data-tab="tasks">Task Logs ${needAttention?`<span class="badge b-red">${needAttention}</span>`:''}</button></div>`;
  if(state.routeTab==='accounts'){
    content+=`<div class="grid grid-3">`+accounts.map(acc=>{
      const sess=activeSessionFor(acc.id); const mine=sess&&sess.userId===user.id; const busy=sess&&!mine; const used=state.tasks.filter(t=>t.account===`Account ${acc.number}` && t.workDate===todayUTC()).reduce((s,t)=>s+parseDuration(t.duration),0); const usedH=+secToH(used); const pct=Math.min(100, (usedH/(acc.maxHours||10))*100);
      return `<div class="card account-card"><div class="account-top"><div><div class="account-name">🖥️ Account ${esc(acc.number)}</div>${acc.project?`<div class="muted">${esc(acc.project)}</div>`:''}</div><span class="badge ${acc.accountStatus==='paused'?'b-yellow':mine?'b-green':busy?'b-red':'b-blue'}">${acc.accountStatus==='paused'?'Stopped':mine?'Connected':busy?'In Use':'Available'}</span></div><div class="info-box mb12"><div class="kv"><span class="muted">ID:</span><span class="mono">${esc(acc.anydeskId)}</span></div><div class="kv"><span class="muted">🔑:</span><span class="mono">${esc(acc.anydeskPass)}</span></div></div><div class="info-box mb12"><div class="kv"><strong>Today limit</strong><span class="mono">${usedH.toFixed(2)}h / ${(acc.maxHours||10).toFixed(2)}h</span></div><div class="progress"><div class="bar" style="width:${pct}%"></div></div></div>${mine?`<button class="btn btn-red" style="width:100%" data-action="logout-account" data-id="${acc.id}">Logout</button>`:`<button class="btn btn-primary" style="width:100%" data-action="login-account" data-id="${acc.id}" ${busy||acc.accountStatus==='paused'?'disabled':''}>${acc.accountStatus==='paused'?'Stopped':busy?'Unavailable':'Login'}</button>`}</div>`;
    }).join('')+`</div>`;
  } else {
    content+=`<div class="row mb12" style="justify-content:flex-end"><button type="button" id="userAddTaskBtn" class="btn btn-green" data-action="new-task">+ AAD New Task</button></div><div class="card p0 table-wrap"><table class="table"><thead><tr><th>Work Date (UTC)</th><th>Platform</th><th>Duration</th><th>Rate $</th><th>Account</th><th>Notes</th><th>Project</th><th>Review Note</th><th>Status</th><th>Action</th></tr></thead><tbody>`;
    if(!myTasks.length) content+=`<tr><td colspan="10" class="empty">No task logs yet</td></tr>`;
    myTasks.sort((a,b)=>new Date(b.submittedAt)-new Date(a.submittedAt)).forEach(t=>{

function adminBillingView(){
  const names=['all',...state.users.map(u=>u.name)];
  const accounts=['all',...state.accounts.map(a=>`Account ${a.number}`)];
  const f=state.billingFilter||{user:'all',account:'all',from:getWeekBounds(todayUTC()).start,to:getWeekBounds(todayUTC()).end,showPaidArchived:false};
  if(!('account' in f)) f.account='all';

  const periodTasks=state.tasks.filter(t=>within(t.workDate,f.from,f.to));
  const filtered=periodTasks.filter(t=>
    (f.user==='all'||t.userName===f.user) &&
    (f.account==='all'||t.account===f.account) &&
    (f.showPaidArchived || !isTaskPaid(t))
  );
  const summaryMap={};
  filtered.forEach(t=>{
    const u=state.users.find(x=>x.id===t.userId||x.name===t.userName)||{};

    if(!summaryMap[key]) summaryMap[key]={userId:u.id||t.userId||'',userName:t.userName,binanceId:u.binanceId||'',seconds:0,payment:paymentRecordFor(u.id||t.userId||'',f.from,f.to)};

  html+=`<div class="card p20 mb16"><div class="section-title">Filtered user totals</div><div class="small mb12">The results below follow the user, account, and date filters above.</div><div class="table-wrap"><table class="table"><thead><tr><th>User</th><th>Binance ID</th><th>Total hours</th><th>User $</th><th>Payment</th><th>Paid at (UTC)</th></tr></thead><tbody>`;
  if(!userSummaries.length) html+=`<tr><td colspan="6" class="empty">No users in this period</td></tr>`;

  });
  html+=`</tbody></table></div></div>`;
  html+=`<div class="card p20 mb16"><div class="section-title">Filtered account totals</div><div class="small mb12">Only the accounts that match the filters are shown here.</div><div class="table-wrap"><table class="table"><thead><tr><th>Account</th><th>Duration</th><th>Hours</th><th>User rate</th><th>User total</th><th>Account rate</th><th>Original total</th></tr></thead><tbody>`;

  });
  html+=`</tbody></table></div></div>`;
  html+=`<div class="card p20"><div class="section-title">Daily ordered list</div><div class="small mb12">This list also follows the same filters above.</div><div class="table-wrap"><table class="table"><thead><tr><th>Date</th><th>User</th><th>Binance ID</th><th>Account</th><th>Duration</th><th>Original</th><th>User $</th><th>Payment</th><th>Notes</th></tr></thead><tbody>`;

    html+=`<tr><td><strong>${fmtDate(t.workDate)}</strong><br><span class="small">${fmtUTC(t.submittedAt)}</span></td><td>${esc(t.userName)}</td><td class="mono">${esc(usr.binanceId||'—')}</td><td>${esc(t.account)}</td><td class="mono">${fmtDuration(secs)}</td><td style="color:#0b6aa9;font-weight:800">$${original.toFixed(2)}</td><td style="color:#1aa551;font-weight:800">$${(hrs*userPayRate).toFixed(2)}</td><td><select class="select payment-select" data-user-id="${esc(t.userId)}" style="min-width:120px"><option value="open" ${payRec?'':'selected'}>Open</option><option value="paid" ${payRec?'selected':''}>Paid</option></select></td><td>${esc(t.notes||t.projectName||'—')}</td></tr>`;
  });
  html+=`</tbody></table></div></div>`;
  return html;
}

  document.querySelector('[data-action="logout"]')?.addEventListener('click',()=>{ auth.signOut(); });
  document.querySelectorAll('[data-action="login-account"]').forEach(b=>b.onclick=()=>{const user=currentUser(); const acc=state.accounts.find(a=>a.id===b.dataset.id); if(!user||!acc) return; if(acc.accountStatus==='paused') return; if(activeSessionFor(acc.id)) return; state.sessions=state.sessions.filter(s=>!(s.userId===user.id&&s.active)); state.sessions.push({id:uid(),accountId:acc.id,userId:user.id,userName:user.name,loginAt:nowISO(),active:true}); render();});
  document.querySelectorAll('[data-action="logout-account"]').forEach(b=>b.onclick=()=>{state.sessions=state.sessions.map(s=>s.accountId===b.dataset.id&&s.active?Object.assign({},s,{active:false,logoutAt:nowISO()}):s); render();});
  document.querySelectorAll('[data-action="new-task"]').forEach(b=>{
    b.onclick=(e)=>{ e.preventDefault(); e.stopPropagation(); openTaskModal(null,currentUser()); return false; };
  });
  document.querySelectorAll('[data-action="edit-task"]').forEach(b=>b.onclick=()=>openTaskModal(state.tasks.find(t=>t.id===b.dataset.id),currentUser()));
  document.querySelectorAll('[data-action="review-task"]').forEach(b=>b.onclick=()=>openReviewModal(state.tasks.find(t=>t.id===b.dataset.id)));
  document.querySelectorAll('[data-action="new-account"]').forEach(b=>b.onclick=()=>openAccountModal(null));
  document.querySelectorAll('[data-action="edit-account"]').forEach(b=>b.onclick=()=>openAccountModal(state.accounts.find(a=>a.id===b.dataset.id)));
  document.querySelectorAll('[data-action="delete-account"]').forEach(b=>b.onclick=()=>{ if(confirm('Delete account?')){ state.accounts=state.accounts.filter(a=>a.id!==b.dataset.id); state.sessions=state.sessions.filter(s=>s.accountId!==b.dataset.id); render(); }});
  document.querySelectorAll('[data-action="toggle-account-status"]').forEach(b=>b.onclick=()=>{ const a=state.accounts.find(x=>x.id===b.dataset.id); if(!a) return; a.accountStatus=a.accountStatus==='paused'?'active':'paused'; render(); });
  document.querySelectorAll('[data-action="new-user"]').forEach(b=>b.onclick=()=>openUserModal(null));
  document.querySelectorAll('[data-action="edit-user"]').forEach(b=>b.onclick=()=>openUserModal(state.users.find(u=>u.id===b.dataset.id)));
  document.querySelector('[data-action="apply-billing-filter"]')?.addEventListener('click',()=>{ state.settings.globalRate=Number($('#billUserRate').value||6); state.billingFilter={user:$('#billUser').value,account:$('#billAccount').value,from:$('#billFrom').value,to:$('#billTo').value,showPaidArchived:$('#showPaidArchived').checked}; render(); });
  document.querySelectorAll('.payment-select').forEach(sel=>sel.addEventListener('change',()=>{ const f=state.billingFilter; const userId=sel.dataset.userId; if(!userId||!f?.from||!f?.to) return; const existing=paymentRecordFor(userId,f.from,f.to); if(sel.value==='paid'){ if(!existing){ const user=state.users.find(u=>u.id===userId)||{}; state.paymentRecords.push({id:uid(),userId:userId,userName:user.name||'',from:f.from,to:f.to,paidAt:nowISO()}); } } else { state.paymentRecords=state.paymentRecords.filter(r=>!(r.userId===userId && r.from===f.from && r.to===f.to)); } render(); }));
}

// ── تهيئة Firebase Auth + Firestore ──
async function loadData() {
  try {
    const doc = await STATE_REF.get();
    if (doc.exists) {
      const data = doc.data();
      state.users           = data.users           || seedUsers;
      state.accounts        = data.accounts        || seedAccounts;
      state.tasks           = data.tasks           || seedTasks;
      state.sessions        = data.sessions        || [];
      state.settings        = data.settings        || state.settings;
      state.paymentRecords  = data.paymentRecords  || [];
    } else {
      await STATE_REF.set(sanitize({
        users: state.users,
        accounts: state.accounts,
        tasks: state.tasks,
        sessions: state.sessions,
        settings: state.settings,
        paymentRecords: state.paymentRecords
      }));
    }
  } catch(e) {
    console.error('Firebase data error:', e);
  }

  normalizeVisibilityRules();

  STATE_REF.onSnapshot({ includeMetadataChanges: true }, (doc) => {
    if (doc.metadata.hasPendingWrites) return;
    if (!doc.exists) return;
    const data = doc.data();
    state.users          = data.users          ?? state.users;
    state.accounts       = data.accounts       ?? state.accounts;
    state.tasks          = data.tasks          ?? state.tasks;
    state.sessions       = data.sessions       ?? state.sessions;
    state.settings       = data.settings       ?? state.settings;
    state.paymentRecords = data.paymentRecords ?? state.paymentRecords;
    normalizeVisibilityRules();
    if(firebaseUser) render();
  });
}

// ✅ Firebase Auth — المدير الرئيسي للدخول والخروج
auth.onAuthStateChanged(async (user) => {
  firebaseUser = user;
  if (user) {
    await loadData();
    render();
  } else {
    loginView();
  }
});
})();
</script>
